name: CI

on:
  push:
    branches:
      - main
      - 'chore/**'
      - 'feature/**'
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Upgrade pip and install project dependencies
        run: |
          python scripts/install_deps.py --force

      - name: Compile Python sources
        run: |
          python -m compileall .

      - name: Smoke import scaffold modules
        env:
          ENVIRONMENT: test
          ENABLE_DATABASE: false
          ENABLE_AI_ANALYSIS: false
        run: |
          python - <<'PY'
          from config import config
          from app_init import initialize_app
          status = initialize_app()
          print(config.app.title)
          print(status.get('status', 'unknown'))
          PY
